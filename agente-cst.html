<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente IA — CST Royal Enfield</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --red: #C8102E;
    --gold: #C9A84C;
    --bg: #1A1A1A;
    --card: #242424;
    --input-bg: #2E2E2E;
    --border: #3A3A3A;
    --border-focus: #C9A84C;
    --text: #F0F0F0;
    --text-muted: #888;
    --error: #FF4D4D;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    text-decoration: none;
    color: var(--text);
    font-size: 16px;
    transition: border-color 0.15s;
    flex-shrink: 0;
  }

  .back-btn:hover { border-color: var(--gold); }

  .header-text h1 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .header-text p {
    font-size: 12px;
    color: var(--text-muted);
  }

  .header-dot {
    width: 8px;
    height: 8px;
    background: #2ECC71;
    border-radius: 50%;
    margin-left: auto;
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(46,204,113,0.5);
  }

  /* CHAT */
  .chat-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    padding: 0 16px;
    max-width: 640px;
    width: 100%;
    margin: 0 auto;
  }

  .chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .chat-empty {
    color: var(--text-muted);
    font-size: 14px;
    text-align: center;
    margin: auto;
    line-height: 1.6;
  }

  .chat-empty strong {
    display: block;
    font-size: 16px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .suggestions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 20px;
  }

  .suggestion {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    text-align: left;
  }

  .suggestion:hover { border-color: var(--gold); color: var(--text); }

  .chat-msg {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 85%;
  }

  .chat-msg.user { align-self: flex-end; align-items: flex-end; }
  .chat-msg.assistant { align-self: flex-start; }

  .chat-role {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-muted);
    padding: 0 4px;
  }

  .chat-bubble {
    padding: 11px 15px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.55;
  }

  .chat-msg.user .chat-bubble {
    background: var(--red);
    color: white;
    border-radius: 12px 12px 2px 12px;
  }

  .chat-msg.assistant .chat-bubble {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 12px 12px 12px 2px;
  }

  .chat-msg.assistant.thinking .chat-bubble {
    color: var(--text-muted);
    font-style: italic;
  }

  /* INPUT */
  .input-area {
    padding: 12px 0 24px;
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 8px 8px 16px;
    transition: border-color 0.15s;
  }

  .input-row:focus-within { border-color: var(--border-focus); }

  .input-row input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    padding: 4px 0;
  }

  .input-row input::placeholder { color: var(--text-muted); }

  .send-btn {
    background: var(--red);
    color: white;
    border: none;
    border-radius: 8px;
    width: 36px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  .send-btn svg { width: 16px; height: 16px; fill: white; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .input-hint {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 8px;
  }
</style>
</head>
<body>

  <div class="header">
    <a class="back-btn" href="index.html">←</a>
    <div class="header-text">
      <h1>Agente IA</h1>
      <p>CST Royal Enfield · claude-sonnet-4-6</p>
    </div>
    <div class="header-dot"></div>
  </div>

  <div class="chat-wrap">
    <div class="chat-history" id="chatHistory">
      <div class="chat-empty">
        <strong>Hola, soy el asistente del taller</strong>
        Pregúntame sobre motos en taller, técnicos,<br>tiempos de entrega o facturación.
        <div class="suggestions">
          <button class="suggestion" onclick="askSuggestion(this)">¿Cuántas motos están en taller ahora?</button>
          <button class="suggestion" onclick="askSuggestion(this)">¿Cuál es la tasa de upsell cerrado este mes?</button>
          <button class="suggestion" onclick="askSuggestion(this)">¿Qué técnico tiene más motos asignadas?</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="chatInput" placeholder="Escribe tu pregunta..." onkeydown="if(event.key==='Enter') sendChat()">
        <button class="send-btn" id="sendBtn" onclick="sendChat()" title="Enviar">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <p class="input-hint">Powered by Claude claude-sonnet-4-6</p>
    </div>
  </div>

<script>
  const WORKER_URL = 'https://cst-royal-enfield-api.juanguillermoalba.workers.dev';

  const SYSTEM_PROMPT = `Eres el asistente operativo del taller CST Royal Enfield Zona T. Tienes acceso a datos del taller. Responde preguntas sobre motos en taller, tiempos, técnicos, upsell y facturación. Sé directo y usa números cuando los tengas. Responde en el idioma en que te escriban.`;

  let chatHistory = [];
  let emptyScreenRemoved = false;

  function removeEmptyScreen() {
    if (!emptyScreenRemoved) {
      const empty = document.querySelector('.chat-empty');
      if (empty) empty.remove();
      emptyScreenRemoved = true;
    }
  }

  function addMessage(text, role, extra = '') {
    removeEmptyScreen();
    const history = document.getElementById('chatHistory');
    const div = document.createElement('div');
    div.className = `chat-msg ${role}${extra ? ' ' + extra : ''}`;
    div.innerHTML = `
      <span class="chat-role">${role === 'user' ? 'Tú' : 'Asistente'}</span>
      <div class="chat-bubble">${text.replace(/\n/g, '<br>')}</div>
    `;
    history.appendChild(div);
    history.scrollTop = history.scrollHeight;
    return div;
  }

  function askSuggestion(btn) {
    document.getElementById('chatInput').value = btn.textContent;
    sendChat();
  }

  async function sendChat() {
    const input = document.getElementById('chatInput');
    const btn = document.getElementById('sendBtn');
    const msg = input.value.trim();
    if (!msg) return;

    addMessage(msg, 'user');
    input.value = '';
    btn.disabled = true;

    chatHistory.push({ role: 'user', content: msg });

    const thinkingEl = addMessage('Pensando...', 'assistant', 'thinking');

    try {
      const res = await fetch(`${WORKER_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: SYSTEM_PROMPT,
          messages: chatHistory,
        }),
      });

      thinkingEl.remove();

      if (!res.ok) throw new Error('Error del servidor');

      const data = await res.json();
      const reply = data.text || data.content?.[0]?.text || data.reply || 'Sin respuesta';

      chatHistory.push({ role: 'assistant', content: reply });
      addMessage(reply, 'assistant');

    } catch (err) {
      thinkingEl.remove();
      addMessage('Error al conectar con el asistente. Intenta de nuevo.', 'assistant');
      chatHistory.pop();
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
