<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="auth.js?v=3"></script>
<title>CST · Correcciones</title>
<style>
  :root{
    --bg:#1A1A1A; --panel:#242424; --panel-2:#2E2E2E; --line:#3A3A3A;
    --ink:#F0F0F0; --muted:#888; --accent:#C8102E; --accent-ink:#C9A84C;
    --ok:#2ECC71; --warn:#C9A84C; --bad:#FF4D4D; --radius:10px;
    --sans:'Inter','Segoe UI',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;}
  .wrap{max-width:900px;margin:0 auto;padding:22px 18px 60px;}
  .top{display:flex;justify-content:space-between;align-items:center;
    padding-bottom:16px;border-bottom:1px solid var(--line);margin-bottom:22px;flex-wrap:wrap;gap:10px;}
  .top .who{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-ink);font-weight:700;}
  .top h1{font-size:22px;font-weight:650;margin-top:4px;}
  .logout{background:none;border:1px solid var(--line);color:var(--muted);
    padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--sans);}
  .logout:hover{border-color:var(--accent);color:var(--ink);}
  .tabs{display:flex;gap:8px;margin-bottom:18px;}
  .tab{background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;}
  .tab.active{border-color:var(--accent-ink);color:var(--ink);background:var(--panel-2);}
  .item{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px 18px;margin-bottom:12px;}
  .item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .item-placa{font-family:var(--mono);font-weight:700;font-size:15px;}
  .item-meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .pill{display:inline-block;font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:99px;}
  .pill.ok{background:rgba(62,201,138,.12);color:var(--ok);}
  .pill.warn{background:rgba(201,168,76,.14);color:var(--warn);}
  .pill.bad{background:rgba(255,77,77,.14);color:var(--bad);}
  .cambio{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;margin:10px 0;font-size:13px;}
  .cambio .campo{color:var(--accent-ink);font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.04em;margin-bottom:4px;}
  .cambio .valores{font-family:var(--mono);}
  .cambio .valores .flecha{color:var(--muted);margin:0 6px;}
  .motivo{font-size:13px;color:var(--muted);margin-bottom:12px;}
  .acciones{display:flex;gap:8px;}
  .act-btn{border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;
    font-family:var(--sans);cursor:pointer;}
  .act-btn.aprobar{background:var(--ok);color:#0d2a1a;}
  .act-btn.rechazar{background:transparent;border:1px solid var(--bad);color:var(--bad);}
  .act-btn:disabled{opacity:.5;cursor:not-allowed;}
  .loading,.empty{padding:30px;text-align:center;color:var(--muted);font-size:14px;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
    background:var(--ok);color:#1A1A1A;font-size:14px;font-weight:600;padding:12px 24px;
    border-radius:999px;transition:transform .3s ease;z-index:999;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.error{background:var(--bad);color:#fff;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
  <div class="wrap">
    <a href="index.html" style="display:inline-flex;align-items:center;gap:4px;color:#C9A84C;font-size:13px;font-weight:600;text-decoration:none;margin-bottom:12px">← Menú</a>
    <div class="top">
      <div>
        <div class="who">Manager / developer</div>
        <h1>Solicitudes de corrección</h1>
      </div>
      <button class="logout" id="logout">Salir</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-filtro="Pendiente">Pendientes</button>
      <button class="tab" data-filtro="Aprobada">Aprobadas</button>
      <button class="tab" data-filtro="Rechazada">Rechazadas</button>
      <button class="tab" data-filtro="Todas">Todas</button>
    </div>

    <div id="lista"><div class="loading">Cargando…</div></div>
  </div>

<div class="toast" id="toast"></div>

<script>
const API = "https://cst-royal-enfield-api.juanguillermoalba.workers.dev";

guard(["manager","developer"]);
const logoutBtn = document.getElementById("logout");
if(logoutBtn){ logoutBtn.addEventListener("click", logout); }

let solicitudes = [];
let filtroActual = "Pendiente";

function showToast(msg, isError){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (isError ? " error" : "");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3500);
}

function estadoPill(estado){
  const clase = estado === "Aprobada" ? "ok" : (estado === "Rechazada" ? "bad" : "warn");
  return '<span class="pill ' + clase + '">' + estado + '</span>';
}

function render(){
  const lista = document.getElementById("lista");
  const filtradas = filtroActual === "Todas"
    ? solicitudes
    : solicitudes.filter(s => s.estado === filtroActual);

  if(filtradas.length === 0){
    lista.innerHTML = '<div class="empty">No hay solicitudes en esta vista.</div>';
    return;
  }

  lista.innerHTML = filtradas.map(s => {
    const fecha = s.fecha ? new Date(s.fecha).toLocaleString('es-CO', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
    const acciones = s.estado === 'Pendiente'
      ? '<div class="acciones">' +
          '<button class="act-btn aprobar" data-id="' + s.id + '" data-decision="aprobar">Aprobar</button>' +
          '<button class="act-btn rechazar" data-id="' + s.id + '" data-decision="rechazar">Rechazar</button>' +
        '</div>'
      : '<div class="item-meta">Revisado por ' + (s.revisadoPor || '—') + '</div>';

    return '<div class="item">' +
      '<div class="item-top">' +
        '<div>' +
          '<span class="item-placa">' + s.placa + '</span> · ' + s.tabla +
          '<div class="item-meta">Solicitado por ' + s.solicitadoPor + ' · ' + fecha + '</div>' +
        '</div>' +
        estadoPill(s.estado) +
      '</div>' +
      '<div class="cambio">' +
        '<div class="campo">' + s.campo + '</div>' +
        '<div class="valores">' + (s.valorAnterior || '—') + '<span class="flecha">→</span>' + s.valorNuevo + '</div>' +
      '</div>' +
      '<div class="motivo">' + s.motivo + '</div>' +
      acciones +
    '</div>';
  }).join('');

  lista.querySelectorAll('.act-btn').forEach(btn => {
    btn.addEventListener('click', () => revisar(btn.getAttribute('data-id'), btn.getAttribute('data-decision'), btn));
  });
}

async function revisar(correccionId, decision, btn){
  const contenedor = btn.closest('.acciones');
  contenedor.querySelectorAll('.act-btn').forEach(b => b.disabled = true);
  try{
    const res = await authFetch(API + "/revisar-correccion", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ correccionId, decision })
    });
    const data = await res.json();
    if(!res.ok || data.error){
      showToast(data.error || "No se pudo procesar.", true);
      contenedor.querySelectorAll('.act-btn').forEach(b => b.disabled = false);
      return;
    }
    showToast(decision === 'aprobar' ? 'Corrección aplicada.' : 'Solicitud rechazada.');
    cargar();
  }catch(e){
    showToast("Error de conexión.", true);
    contenedor.querySelectorAll('.act-btn').forEach(b => b.disabled = false);
  }
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    filtroActual = tab.getAttribute('data-filtro');
    render();
  });
});

async function cargar(){
  try{
    const res = await authFetch(API + "/correcciones");
    const data = await res.json();
    if(!res.ok || data.error){
      document.getElementById("lista").innerHTML = '<div class="empty">' + (data.error || "No se pudo cargar.") + '</div>';
      return;
    }
    solicitudes = data.solicitudes || [];
    render();
  }catch(e){
    document.getElementById("lista").innerHTML = '<div class="empty">No se pudo conectar con el servidor. Reintenta.</div>';
  }
}
cargar();
</script>
</body>
</html>
