<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="auth.js?v=3"></script>
<title>CST · Mi taller</title>
<style>
  :root{
    --bg:#1A1A1A; --panel:#242424; --panel-2:#2E2E2E; --line:#3A3A3A;
    --ink:#F0F0F0; --muted:#888; --accent:#C8102E; --accent-ink:#C9A84C;
    --ok:#2ECC71; --warn:#C9A84C; --radius:10px;
    --sans:'Inter','Segoe UI',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;}
  .wrap{max-width:1000px;margin:0 auto;padding:22px 18px 60px;}
  .top{display:flex;justify-content:space-between;align-items:center;
    padding-bottom:16px;border-bottom:1px solid var(--line);margin-bottom:22px;flex-wrap:wrap;gap:10px;}
  .top .who{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-ink);font-weight:700;}
  .top h1{font-size:22px;font-weight:650;margin-top:4px;}
  .logout{background:none;border:1px solid var(--line);color:var(--muted);
    padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--sans);}
  .logout:hover{border-color:var(--accent);color:var(--ink);}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px;}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;}
  .kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;}
  .kpi .val{font-size:26px;font-weight:700;margin-top:8px;letter-spacing:-.02em;}
  .kpi .val.mono{font-family:var(--mono);font-size:22px;}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:6px 0 12px;font-weight:600;}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  th,td{padding:11px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--line);}
  th{background:var(--panel-2);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;}
  tr:last-child td{border-bottom:none;}
  td.placa{font-family:var(--mono);font-weight:600;}
  td.val{font-family:var(--mono);text-align:right;}
  .badge{font-size:11px;padding:3px 8px;border-radius:99px;border:1px solid var(--line);}
  .loading,.empty{padding:30px;text-align:center;color:var(--muted);font-size:14px;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div style="display:flex;align-items:center;gap:12px">
        <img src="assets/re-blanco.png" alt="Royal Enfield" style="height:36px;width:auto">
        <div>
          <div class="who" id="who">Técnico</div>
          <h1 id="titulo">Mi taller</h1>
        </div>
      </div>
      <button class="logout" id="logout">Salir</button>
    </div>

    <div class="kpis">
      <div class="kpi"><div class="label">Motos asignadas</div><div class="val" id="k-motos">—</div></div>
      <div class="kpi"><div class="label">Valor estimado total</div><div class="val mono" id="k-valor">—</div></div>
      <div class="kpi"><div class="label">Ticket promedio</div><div class="val mono" id="k-ticket">—</div></div>
    </div>

    <h2>Mis motos</h2>
    <table>
      <thead>
        <tr><th>Placa</th><th>Servicio</th><th>Complejidad</th><th style="text-align:right">Valor est.</th></tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="4" class="loading">Cargando…</td></tr>
      </tbody>
    </table>
  </div>

<script>
const API = "https://cst-royal-enfield-api.juanguillermoalba.workers.dev";

/* Guard de sesion: solo tecnico */
const session = guard(["tecnico"]);
const nombre = (session && session.tecnico) || "";
document.getElementById("who").textContent = "Tecnico · " + nombre;
document.getElementById("titulo").textContent = "Hola, " + nombre;
const logoutBtn = document.getElementById("logout");
if(logoutBtn){ logoutBtn.addEventListener("click", logout); }

const cop = n => "$" + Number(n||0).toLocaleString("es-CO");

async function cargar(){
  try{
    const res = await authFetch(API + "/dashboard");
    const data = await res.json();
    const records = (data && data.ingreso && data.ingreso.records) || [];

    if(records.length === 0){
      document.getElementById("k-motos").textContent = "0";
      document.getElementById("k-valor").textContent = cop(0);
      document.getElementById("k-ticket").textContent = cop(0);
      document.getElementById("rows").innerHTML =
        '<tr><td colspan="4" class="empty">Aun no tienes motos asignadas.</td></tr>';
      return;
    }

    const motos = records.map(r => {
      const f = r.fields || {};
      const serv = Array.isArray(f["Tipo servicio"]) ? f["Tipo servicio"].join(", ") : (f["Tipo servicio"] || "—");
      return {
        placa: f["Placa"] || "—",
        servicio: serv,
        complejidad: f["Complejidad"] || "—",
        valor: Number(f["Valor estimado"] || 0)
      };
    });

    const total = motos.reduce((s,m)=> s + m.valor, 0);
    document.getElementById("k-motos").textContent  = motos.length;
    document.getElementById("k-valor").textContent  = cop(total);
    document.getElementById("k-ticket").textContent = cop(Math.round(total/motos.length));

    document.getElementById("rows").innerHTML = motos.slice(0,20).map(m =>
      '<tr>' +
        '<td class="placa">' + m.placa + '</td>' +
        '<td>' + m.servicio + '</td>' +
        '<td><span class="badge">' + m.complejidad + '</span></td>' +
        '<td class="val">' + cop(m.valor) + '</td>' +
      '</tr>').join("");

  }catch(e){
    document.getElementById("rows").innerHTML =
      '<tr><td colspan="4" class="empty">No se pudo conectar con el servidor. Reintenta.</td></tr>';
  }
}
cargar();
</script>
</body>
</html>
