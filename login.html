<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CST Royal Enfield — Acceso</title>
<style>
  :root{
    --bg:#1A1A1A;
    --panel:#242424;
    --panel-2:#2E2E2E;
    --line:#3A3A3A;
    --ink:#F0F0F0;
    --muted:#888;
    --accent:#C8102E;        /* rojo Royal Enfield */
    --accent-ink:#C9A84C;    /* gold Royal Enfield */
    --ok:#2ECC71;
    --radius:10px;
    --sans:'Inter','Segoe UI',system-ui,sans-serif;
    --mono:'JetBrains Mono','Consolas',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:var(--sans);
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(200,16,46,.10), transparent 60%),
      var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .card{
    width:100%; max-width:400px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
  }
  .head{
    padding:28px 28px 22px;
    border-bottom:1px solid var(--line);
  }
  .brand{
    font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--accent-ink); font-weight:700; margin-bottom:10px;
  }
  .head h1{ font-size:21px; font-weight:650; letter-spacing:-.01em; }
  .head p{ color:var(--muted); font-size:13px; margin-top:5px; }

  .body{ padding:24px 28px 28px; }
  label{
    display:block; font-size:11px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--muted); font-weight:600; margin-bottom:7px; margin-top:16px;
  }
  label:first-child{ margin-top:0; }
  input, select{
    width:100%; padding:12px 13px;
    background:var(--panel-2); border:1px solid var(--line); border-radius:8px;
    color:var(--ink); font-family:var(--sans); font-size:14px;
    transition:border-color .15s;
  }
  input:focus, select:focus{ outline:none; border-color:var(--accent); }

  button{
    width:100%; margin-top:22px; padding:13px;
    background:var(--accent); color:#fff; border:none; border-radius:8px;
    font-family:var(--sans); font-size:14px; font-weight:650; cursor:pointer;
    transition:background .15s;
  }
  button:hover{ background:#a00d24; }
  button:focus-visible{ outline:2px solid var(--accent-ink); outline-offset:2px; }

  .err{
    display:none; margin-top:14px; padding:10px 12px;
    background:rgba(200,16,46,.10); border:1px solid rgba(200,16,46,.35);
    border-radius:8px; color:#ff6a7e; font-size:13px;
  }
  .err.show{ display:block; }

  .foot{
    padding:14px 28px; border-top:1px solid var(--line);
    font-size:11px; color:var(--muted); font-family:var(--mono);
    display:flex; justify-content:space-between;
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important;} }
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="brand">CST · Royal Enfield Zona T</div>
      <img src="assets/re-blanco.png" alt="Royal Enfield" style="display:block;margin:4px auto 14px;max-width:140px;width:100%;height:auto">
      <h1>Acceso al sistema</h1>
      <p>Ingresa con tu usuario y clave asignada.</p>
    </div>
    <div class="body">
      <div id="loginWrap">
        <label for="user">Usuario</label>
        <input id="user" type="text" autocomplete="username" placeholder="usuario" autofocus>

        <label for="pass">Clave</label>
        <input id="pass" type="password" autocomplete="current-password" placeholder="••••••••">

        <button id="btn">Entrar</button>
        <div class="err" id="err">Usuario o clave incorrectos.</div>
      </div>

      <div id="cambioWrap" style="display:none">
        <p style="color:var(--muted);font-size:13px;margin-bottom:4px">
          Debes cambiar tu clave antes de continuar.
        </p>
        <label for="claveActual">Clave actual</label>
        <input id="claveActual" type="password" autocomplete="current-password" placeholder="••••••••">

        <label for="claveNueva">Nueva clave (mínimo 8 caracteres)</label>
        <input id="claveNueva" type="password" autocomplete="new-password" placeholder="••••••••">

        <label for="claveConfirm">Confirmar nueva clave</label>
        <input id="claveConfirm" type="password" autocomplete="new-password" placeholder="••••••••">

        <button id="btnCambiar">Cambiar clave y entrar</button>
        <div class="err" id="errCambio"></div>
      </div>
    </div>
    <div class="foot" style="align-items:center">
      <span>v0.1 · prototipo</span>
      <img src="assets/zonat-blanco.png" alt="Zona T Originals" style="width:80px;height:auto">
    </div>
  </div>

<script>
/* Autenticación JWT: el Worker valida usuario/clave y devuelve el token.
   Este archivo solo guarda { token, rol, tecnico } en sessionStorage. */
const API = "https://cst-royal-enfield-api.juanguillermoalba.workers.dev";

const userEl   = document.getElementById("user");
const passEl   = document.getElementById("pass");
const errEl     = document.getElementById("err");
const btn       = document.getElementById("btn");
const loginWrap = document.getElementById("loginWrap");

const cambioWrap  = document.getElementById("cambioWrap");
const claveActual = document.getElementById("claveActual");
const claveNueva  = document.getElementById("claveNueva");
const claveConfirm= document.getElementById("claveConfirm");
const btnCambiar  = document.getElementById("btnCambiar");
const errCambio   = document.getElementById("errCambio");

let sesionPendiente = null;   // sesión guardada mientras se fuerza cambio de clave

function mostrarError(el, msg){
  el.textContent = msg;
  el.classList.add("show");
}

function redirigir(rol){
  window.location.href = (rol === "tecnico") ? "dashboard-tecnico.html" : "index.html";
}

async function entrar(){
  errEl.classList.remove("show");
  const usuario  = userEl.value.trim();
  const password = passEl.value;
  const body = { usuario, password };

  btn.disabled = true;
  try{
    const res = await fetch(API + "/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    const data = await res.json();

    if(!res.ok || data.error){
      mostrarError(errEl, data.error || "Usuario o clave incorrectos.");
      return;
    }

    const session = { token: data.token, rol: data.rol, tecnico: data.tecnico };
    sessionStorage.setItem("cst_session", JSON.stringify(session));

    if(data.debe_cambiar){
      sesionPendiente = session;
      loginWrap.style.display = "none";
      cambioWrap.style.display = "block";
      claveActual.focus();
      return;
    }
    redirigir(session.rol);
  }catch(e){
    mostrarError(errEl, "Error de conexión. Intenta de nuevo.");
  }finally{
    btn.disabled = false;
  }
}

async function cambiarClave(){
  errCambio.classList.remove("show");
  const actual  = claveActual.value;
  const nueva   = claveNueva.value;
  const confirm = claveConfirm.value;

  if(nueva.length < 8){
    mostrarError(errCambio, "La nueva clave debe tener al menos 8 caracteres.");
    return;
  }
  if(nueva !== confirm){
    mostrarError(errCambio, "Las claves nuevas no coinciden.");
    return;
  }

  btnCambiar.disabled = true;
  try{
    const res = await fetch(API + "/cambiar-clave", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + sesionPendiente.token
      },
      body: JSON.stringify({ actual, nueva })
    });
    const data = await res.json();

    if(!res.ok || data.error){
      mostrarError(errCambio, data.error || "No se pudo cambiar la clave.");
      return;
    }
    redirigir(sesionPendiente.rol);
  }catch(e){
    mostrarError(errCambio, "Error de conexión. Intenta de nuevo.");
  }finally{
    btnCambiar.disabled = false;
  }
}

btn.addEventListener("click", entrar);
passEl.addEventListener("keydown", e => { if(e.key === "Enter") entrar(); });
btnCambiar.addEventListener("click", cambiarClave);
claveConfirm.addEventListener("keydown", e => { if(e.key === "Enter") cambiarClave(); });
</script>
</body>
</html>
