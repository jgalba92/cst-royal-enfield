<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CST Royal Enfield — Acceso</title>
<style>
  :root{
    --bg:#1A1A1A;
    --panel:#242424;
    --panel-2:#2E2E2E;
    --line:#3A3A3A;
    --ink:#F0F0F0;
    --muted:#888;
    --accent:#C8102E;        /* rojo Royal Enfield */
    --accent-ink:#C9A84C;    /* gold Royal Enfield */
    --ok:#2ECC71;
    --radius:10px;
    --sans:'Inter','Segoe UI',system-ui,sans-serif;
    --mono:'JetBrains Mono','Consolas',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:var(--sans);
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(200,16,46,.10), transparent 60%),
      var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .card{
    width:100%; max-width:400px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
  }
  .head{
    padding:28px 28px 22px;
    border-bottom:1px solid var(--line);
  }
  .brand{
    font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--accent-ink); font-weight:700; margin-bottom:10px;
  }
  .head h1{ font-size:21px; font-weight:650; letter-spacing:-.01em; }
  .head p{ color:var(--muted); font-size:13px; margin-top:5px; }

  .body{ padding:24px 28px 28px; }
  label{
    display:block; font-size:11px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--muted); font-weight:600; margin-bottom:7px; margin-top:16px;
  }
  label:first-child{ margin-top:0; }
  input, select{
    width:100%; padding:12px 13px;
    background:var(--panel-2); border:1px solid var(--line); border-radius:8px;
    color:var(--ink); font-family:var(--sans); font-size:14px;
    transition:border-color .15s;
  }
  input:focus, select:focus{ outline:none; border-color:var(--accent); }

  button{
    width:100%; margin-top:22px; padding:13px;
    background:var(--accent); color:#fff; border:none; border-radius:8px;
    font-family:var(--sans); font-size:14px; font-weight:650; cursor:pointer;
    transition:background .15s;
  }
  button:hover{ background:#a00d24; }
  button:focus-visible{ outline:2px solid var(--accent-ink); outline-offset:2px; }

  .err{
    display:none; margin-top:14px; padding:10px 12px;
    background:rgba(200,16,46,.10); border:1px solid rgba(200,16,46,.35);
    border-radius:8px; color:#ff6a7e; font-size:13px;
  }
  .err.show{ display:block; }

  .pass-field{ position:relative; }
  .pass-field input{ padding-right:66px; }
  .pass-toggle{
    position:absolute; right:5px; top:50%; transform:translateY(-50%);
    width:auto; margin-top:0; padding:5px 10px;
    background:transparent; border:none; border-radius:6px;
    color:var(--muted); font-size:11px; font-weight:700; letter-spacing:.03em; text-transform:uppercase;
    cursor:pointer;
  }
  .pass-toggle:hover{ background:var(--panel-2); color:var(--ink); }

  .foot{
    padding:14px 28px; border-top:1px solid var(--line);
    font-size:11px; color:var(--muted); font-family:var(--mono);
    display:flex; justify-content:space-between;
  }
  @media (prefers-reduced-motion:reduce){ *{transition:none!important;} }
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="brand">CST · Royal Enfield Zona T</div>
      <img src="assets/re-blanco.png" alt="Royal Enfield" style="display:block;margin:4px auto 14px;max-width:140px;width:100%;height:auto">
      <h1>Acceso al sistema</h1>
      <p>Ingresa con tu usuario y clave asignada.</p>
    </div>
    <div class="body">
      <div id="userWrap">
        <label for="user">Usuario</label>
        <input id="user" type="text" autocomplete="username" placeholder="usuario" autofocus>

        <button id="btnContinuar">Continuar</button>
        <div class="err" id="errUser"></div>
      </div>

      <div id="passWrap" style="display:none">
        <p style="color:var(--muted);font-size:13px;margin-bottom:4px" id="passUsuarioLabel"></p>
        <label for="pass">Clave</label>
        <div class="pass-field">
          <input id="pass" type="password" autocomplete="current-password" placeholder="••••••••">
          <button type="button" class="pass-toggle" data-target="pass">Ver</button>
        </div>

        <button id="btn">Entrar</button>
        <button type="button" id="btnVolverPass" style="background:none;border:1px solid var(--line);color:var(--muted);margin-top:8px">← Cambiar usuario</button>
        <div class="err" id="err">Usuario o clave incorrectos.</div>
      </div>

      <div id="resetWrap" style="display:none">
        <p style="color:var(--muted);font-size:13px;margin-bottom:4px">
          Tienes una solicitud de reinicio de clave activa. Define tu clave nueva para entrar.
        </p>
        <label for="claveResetNueva">Nueva clave (mínimo 8 caracteres)</label>
        <div class="pass-field">
          <input id="claveResetNueva" type="password" autocomplete="new-password" placeholder="••••••••">
          <button type="button" class="pass-toggle" data-target="claveResetNueva">Ver</button>
        </div>

        <label for="claveResetConfirm">Confirmar nueva clave</label>
        <div class="pass-field">
          <input id="claveResetConfirm" type="password" autocomplete="new-password" placeholder="••••••••">
          <button type="button" class="pass-toggle" data-target="claveResetConfirm">Ver</button>
        </div>

        <button id="btnGuardarReset">Guardar y entrar</button>
        <button type="button" id="btnVolverReset" style="background:none;border:1px solid var(--line);color:var(--muted);margin-top:8px">← Cambiar usuario</button>
        <div class="err" id="errReset"></div>
      </div>

      <div id="cambioWrap" style="display:none">
        <p style="color:var(--muted);font-size:13px;margin-bottom:4px">
          Debes cambiar tu clave antes de continuar.
        </p>
        <label for="claveActual">Clave actual</label>
        <div class="pass-field">
          <input id="claveActual" type="password" autocomplete="current-password" placeholder="••••••••">
          <button type="button" class="pass-toggle" data-target="claveActual">Ver</button>
        </div>

        <label for="claveNueva">Nueva clave (mínimo 8 caracteres)</label>
        <div class="pass-field">
          <input id="claveNueva" type="password" autocomplete="new-password" placeholder="••••••••">
          <button type="button" class="pass-toggle" data-target="claveNueva">Ver</button>
        </div>

        <label for="claveConfirm">Confirmar nueva clave</label>
        <div class="pass-field">
          <input id="claveConfirm" type="password" autocomplete="new-password" placeholder="••••••••">
          <button type="button" class="pass-toggle" data-target="claveConfirm">Ver</button>
        </div>

        <button id="btnCambiar">Cambiar clave y entrar</button>
        <div class="err" id="errCambio"></div>
      </div>
    </div>
    <div class="foot" style="align-items:center">
      <span>v0.1 · prototipo</span>
      <img src="assets/zonat-blanco.png" alt="Zona T Originals" style="width:80px;height:auto">
    </div>
  </div>

<script>
/* Autenticación JWT: el Worker valida usuario/clave y devuelve el token.
   Este archivo solo guarda { token, rol, tecnico } en sessionStorage. */
const API = "https://cst-royal-enfield-api.juanguillermoalba.workers.dev";

const userEl        = document.getElementById("user");
const btnContinuar   = document.getElementById("btnContinuar");
const errUserEl      = document.getElementById("errUser");
const userWrap       = document.getElementById("userWrap");

const passWrap          = document.getElementById("passWrap");
const passUsuarioLabel  = document.getElementById("passUsuarioLabel");
const passEl            = document.getElementById("pass");
const errEl             = document.getElementById("err");
const btn               = document.getElementById("btn");
const btnVolverPass     = document.getElementById("btnVolverPass");

const resetWrap         = document.getElementById("resetWrap");
const claveResetNueva   = document.getElementById("claveResetNueva");
const claveResetConfirm = document.getElementById("claveResetConfirm");
const btnGuardarReset   = document.getElementById("btnGuardarReset");
const errReset          = document.getElementById("errReset");
const btnVolverReset    = document.getElementById("btnVolverReset");

const cambioWrap  = document.getElementById("cambioWrap");
const claveActual = document.getElementById("claveActual");
const claveNueva  = document.getElementById("claveNueva");
const claveConfirm= document.getElementById("claveConfirm");
const btnCambiar  = document.getElementById("btnCambiar");
const errCambio   = document.getElementById("errCambio");

let usuarioActual = "";
let sesionPendiente = null;   // sesión guardada mientras se fuerza cambio de clave

function mostrarError(el, msg){
  el.textContent = msg;
  el.classList.add("show");
}
function ocultarError(el){ el.classList.remove("show"); }

function redirigir(rol){
  window.location.href = (rol === "tecnico") ? "dashboard-tecnico.html" : "index.html";
}

function volverAUsuario(){
  passWrap.style.display = "none";
  resetWrap.style.display = "none";
  userWrap.style.display = "block";
  passEl.value = "";
  claveResetNueva.value = "";
  claveResetConfirm.value = "";
  userEl.focus();
}

/* Paso 1: escribe el usuario, revisamos si tiene un reset pendiente
   antes de decidir si pedimos la clave actual o una clave nueva. */
async function continuar(){
  ocultarError(errUserEl);
  const usuario = userEl.value.trim();
  if(!usuario){
    mostrarError(errUserEl, "Escribe tu usuario.");
    return;
  }
  usuarioActual = usuario;
  btnContinuar.disabled = true;
  try{
    const res = await fetch(API + "/check-reset?usuario=" + encodeURIComponent(usuario));
    const data = await res.json();
    userWrap.style.display = "none";
    if(data.resetPendiente){
      resetWrap.style.display = "block";
      claveResetNueva.focus();
    }else{
      passWrap.style.display = "block";
      passUsuarioLabel.textContent = "Usuario: " + usuario;
      passEl.focus();
    }
  }catch(e){
    userWrap.style.display = "block";
    mostrarError(errUserEl, "Error de conexión. Intenta de nuevo.");
  }finally{
    btnContinuar.disabled = false;
  }
}

/* Login normal con usuario + clave; también se reutiliza justo después
   de guardar una clave nueva, para entrar sin pedirla dos veces. */
async function entrarConClave(usuario, password){
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ usuario, password })
  });
  const data = await res.json();
  if(!res.ok || data.error) throw new Error(data.error || "Usuario o clave incorrectos.");

  const session = { token: data.token, rol: data.rol, tecnico: data.tecnico };
  sessionStorage.setItem("cst_session", JSON.stringify(session));

  if(data.debe_cambiar){
    sesionPendiente = session;
    passWrap.style.display = "none";
    resetWrap.style.display = "none";
    cambioWrap.style.display = "block";
    claveActual.focus();
    return;
  }
  redirigir(session.rol);
}

async function entrar(){
  ocultarError(errEl);
  btn.disabled = true;
  try{
    await entrarConClave(usuarioActual, passEl.value);
  }catch(e){
    mostrarError(errEl, e.message);
  }finally{
    btn.disabled = false;
  }
}

/* Paso 2b: solo aparece si /check-reset confirmó un reset pendiente.
   Define la clave nueva sin pedir la anterior y entra directo. */
async function guardarReset(){
  ocultarError(errReset);
  const nueva   = claveResetNueva.value;
  const confirm = claveResetConfirm.value;

  if(nueva.length < 8){
    mostrarError(errReset, "La clave nueva debe tener al menos 8 caracteres.");
    return;
  }
  if(nueva !== confirm){
    mostrarError(errReset, "Las claves no coinciden.");
    return;
  }

  btnGuardarReset.disabled = true;
  try{
    const res = await fetch(API + "/completar-reset", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario: usuarioActual, nuevaClave: nueva })
    });
    const data = await res.json();
    if(!res.ok || data.error){
      mostrarError(errReset, data.error || "No se pudo guardar la clave.");
      return;
    }
    await entrarConClave(usuarioActual, nueva);
  }catch(e){
    mostrarError(errReset, e.message || "Error de conexión. Intenta de nuevo.");
  }finally{
    btnGuardarReset.disabled = false;
  }
}

async function cambiarClave(){
  ocultarError(errCambio);
  const actual  = claveActual.value;
  const nueva   = claveNueva.value;
  const confirm = claveConfirm.value;

  if(nueva.length < 8){
    mostrarError(errCambio, "La nueva clave debe tener al menos 8 caracteres.");
    return;
  }
  if(nueva !== confirm){
    mostrarError(errCambio, "Las claves nuevas no coinciden.");
    return;
  }

  btnCambiar.disabled = true;
  try{
    const res = await fetch(API + "/cambiar-clave", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + sesionPendiente.token
      },
      body: JSON.stringify({ actual, nueva })
    });
    const data = await res.json();

    if(!res.ok || data.error){
      mostrarError(errCambio, data.error || "No se pudo cambiar la clave.");
      return;
    }
    redirigir(sesionPendiente.rol);
  }catch(e){
    mostrarError(errCambio, "Error de conexión. Intenta de nuevo.");
  }finally{
    btnCambiar.disabled = false;
  }
}

btnContinuar.addEventListener("click", continuar);
userEl.addEventListener("keydown", e => { if(e.key === "Enter") continuar(); });

btn.addEventListener("click", entrar);
passEl.addEventListener("keydown", e => { if(e.key === "Enter") entrar(); });
btnVolverPass.addEventListener("click", volverAUsuario);

btnGuardarReset.addEventListener("click", guardarReset);
claveResetConfirm.addEventListener("keydown", e => { if(e.key === "Enter") guardarReset(); });
btnVolverReset.addEventListener("click", volverAUsuario);

btnCambiar.addEventListener("click", cambiarClave);
claveConfirm.addEventListener("keydown", e => { if(e.key === "Enter") cambiarClave(); });

/* Ver/ocultar clave: un botón por campo, alterna type="password" <-> "text" */
document.querySelectorAll(".pass-toggle").forEach(toggleBtn => {
  toggleBtn.addEventListener("click", () => {
    const input = document.getElementById(toggleBtn.getAttribute("data-target"));
    const mostrar = input.type === "password";
    input.type = mostrar ? "text" : "password";
    toggleBtn.textContent = mostrar ? "Ocultar" : "Ver";
  });
});
</script>
</body>
</html>
